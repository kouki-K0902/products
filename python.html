<!DOCTYPE html>
<html>
<head>
    <title>GitHub Python Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        #output { background: #f4f4f4; padding: 10px; border-radius: 5px; white-space: pre-wrap; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>ブラウザでPython実行 (Pyodide)</h2>
    
    <p>数値を入力してください（Pythonで2乗を計算します）:</p>
    <input type="number" id="userInput" value="5">
    <button id="runButton" onclick="runPython()" disabled>準備中...</button>

    <h3>実行結果:</h3>
    <div id="output">Pyodideを読み込んでいます...</div>

    <script>
        let pyodide;

        // 1. Pyodideの初期化
        async function setup() {
            pyodide = await loadPyodide();
            document.getElementById('runButton').disabled = false;
            document.getElementById('runButton').innerText = 'Pythonを実行';
            document.getElementById('output').innerText = '準備完了！';
        }
        setup();

        // 2. ボタンを押した時の処理
        async function runPython() {
            const val = document.getElementById('userInput').value;
            
            try {
                // JSの変数をPython側に渡して実行
                pyodide.globals.set("input_val", val);
                let result = await pyodide.runPythonAsync(`
                    # ここにPythonコードを書く
                    num = int(input_val)
                    f"入力された {num} の2乗は {num**2} です。"
                `);
                
                document.getElementById('output').innerText = result;
            } catch (err) {
                document.getElementById('output').innerText = "エラー: " + err;
            }
        }
    </script>
</body>
</html>
