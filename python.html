<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Python Code Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        /* エディタ風のスタイル */
        textarea { 
            width: 100%; height: 250px; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #1e1e1e; color: #d4d4d4; 
            padding: 15px; border-radius: 8px; font-size: 14px;
            box-sizing: border-box; resize: vertical;
        }
        button { 
            margin-top: 10px; padding: 12px 24px; font-size: 16px; 
            background-color: #28a745; color: white; border: none; 
            border-radius: 5px; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #output { 
            margin-top: 20px; padding: 15px; 
            background: #f8f9fa; border-left: 5px solid #28a745; 
            white-space: pre-wrap; font-family: monospace; min-height: 50px;
        }
        .status { color: #666; font-size: 0.9em; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Python Web Runner</h1>
    <div class="status" id="status">Pyodideを読み込み中... (20MB程度のDLが発生します)</div>
    
    <textarea id="codeEditor" placeholder="ここにPythonコードを書いてください...">
import math

def circle_area(radius):
    return math.pi * (radius ** 2)

print(f"半径5の円の面積は: {circle_area(5)}")
</textarea>

    <button id="runButton" onclick="evaluatePython()" disabled>実行する</button>

    <h3>実行結果 (標準出力):</h3>
    <div id="output">準備ができるまでお待ちください...</div>

    <script>
        let pyodide;

        async function init() {
            try {
                pyodide = await loadPyodide();
                document.getElementById('status').innerText = "✅ 準備完了！自由にコードを入力してください。";
                document.getElementById('runButton').disabled = false;
                document.getElementById('output').innerText = "ここに実行結果が表示されます。";
            } catch (e) {
                document.getElementById('output').innerText = "初期化エラー: " + e;
            }
        }
        init();

        async function evaluatePython() {
            const code = document.getElementById('codeEditor').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerText = "実行中...";

            try {
                // Pythonの標準出力をJavaScriptで受け取るための設定
                pyodide.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                `);

                // ユーザーコードの実行
                await pyodide.runPythonAsync(code);

                // 標準出力の結果を取得
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                outputDiv.innerText = stdout || "（出力なし）";
            } catch (err) {
                outputDiv.innerText = "エラー発生:\n" + err;
            }
        }
    </script>
</body>
</html>
