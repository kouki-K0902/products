
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe AI Dashboard</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050510; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }
        /* 左側の3Dビューエリア */
        #graph-container { flex: 1; position: relative; overflow: hidden; }
        
        /* 右側の情報パネルエリア */
        #sidebar {
            width: 350px; background-color: #111116; border-left: 1px solid #333;
            display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .panel-header { padding: 20px 20px 10px 20px; border-bottom: 1px solid #222; }
        .panel-header h2 { margin: 0; font-size: 18px; color: #fff; letter-spacing: 1px; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* 盤面のデザイン */
        .board-card {
            background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px;
            padding: 15px; margin-bottom: 20px; text-align: center;
            transition: all 0.2s ease;
        }
        .board-card.clickable { cursor: pointer; }
        .board-card.clickable:hover { background: rgba(255,255,255,0.15); border-color: #666; transform: translateY(-2px); }
        .board-grid { font-family: monospace; font-size: 22px; line-height: 1.6; letter-spacing: 4px; }
        
        /* 3Dグラフ内のツールチップ用 */
        .node-tooltip {
            font-family: monospace; font-size: 16px; text-align: center;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444;
        }
        
        /* スクロールバーの装飾 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }
    </style>
</head>
<body>

    <div id="graph-container"></div>

    <div id="sidebar">
        <div class="panel-header">
            <h2>AI脳内ナビゲーター</h2>
        </div>
        <div class="panel-content">
            <h3>現在の盤面</h3>
            <div id="current-board-container"></div>
            
            <h3 style="margin-top: 30px;">移動可能な盤面（次の手）</h3>
            <div id="next-moves-container"></div>
        </div>
    </div>

        const rootNodeId = "(np.int8(0), np.int8(0), np.int8(0), np.int8(0), np.int8(0), np.int8(0), np.int8(0), np.int8(0), np.int8(0))";
        
        const container = document.getElementById('graph-container');

        // 1. 3Dグラフの初期化 (エラー原因だった幅・高さの強制指定を削除し、ブラウザの描画に任せる)
        const Graph = ForceGraph3D()(container)
            .graphData(gData)
            .dagMode('td')
            .dagLevelDistance(80)
            .nodeLabel(node => `<div class="node-tooltip">${node.name}</div>`)
            .nodeColor('color')
            .nodeRelSize(4)
            .linkDirectionalArrowLength(3.5)
            .linkDirectionalArrowRelPos(1)
            .linkWidth(0.5)
            .backgroundColor('#050510') // 背景を透過から指定色へ変更し安定化
            .onNodeClick(node => focusNode(node));

        Graph.d3Force('charge').strength(-120);

        // コンテナのサイズが確定・変更された時に自動でグラフのサイズを合わせる
        const resizeObserver = new ResizeObserver(() => {
            if (container.clientWidth > 0 && container.clientHeight > 0) {
                Graph.width(container.clientWidth).height(container.clientHeight);
            }
        });
        resizeObserver.observe(container);

        // 2. ノードクリック時の処理（3Dカメラ移動 ＋ 2Dサイドバー更新）
        function focusNode(node) {
            // カメラを寄せる
            const distance = 80;
            const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
            Graph.cameraPosition(
                { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
                node, 
                1500 // 1.5秒かけて移動
            );
            
            updateSidebar(node);
        }

        // 3. 右側パネル（サイドバー）のHTMLを書き換える関数
        function updateSidebar(node) {
            document.getElementById('current-board-container').innerHTML = `
                <div class="board-card">
                    <div class="board-grid">${node.name}</div>
                </div>
            `;

            const nextMovesContainer = document.getElementById('next-moves-container');
            nextMovesContainer.innerHTML = '';
            
            const childrenLinks = gData.links.filter(l => 
                (typeof l.source === 'object' ? l.source.id : l.source) === node.id
            );

            if (childrenLinks.length === 0) {
                nextMovesContainer.innerHTML = '<p style="color:#777; font-size:14px; text-align:center;">次の手はありません（終局）</p>';
                return;
            }

            childrenLinks.forEach(link => {
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;
                const targetNode = gData.nodes.find(n => n.id === targetId);
                
                if (targetNode) {
                    const card = document.createElement('div');
                    card.className = 'board-card clickable';
                    card.innerHTML = `<div class="board-grid">${targetNode.name}</div>`;
                    
                    card.onclick = () => focusNode(targetNode);
                    
                    nextMovesContainer.appendChild(card);
                }
            });
        }

        // 初期化：描画が安定した後にルートノードをセット
        setTimeout(() => {
            const rootNode = gData.nodes.find(n => n.id === rootNodeId);
            if (rootNode) {
                updateSidebar(rootNode);
            }
        }, 1000);

    </script>
